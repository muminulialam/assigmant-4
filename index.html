<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Job Application Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <!-- Header Section -->
    <header class="header">
      <h1>Available Jobs <span>(8 jobs)</span></h1>
      <div class="filter-menu">
        <button>All</button>
        <button>Interview</button>
        <button>Rejected</button>
      </div>
    </header>

    <!-- Statistics Section -->
    <section class="stats">
      <div class="stat-card">
        <p>Total</p>
        <h2>8</h2>
      </div>
      <div class="stat-card">
        <p>Interview</p>
        <h2 id="interviewCount">0</h2>
      </div>
      <div class="stat-card">
        <p>Rejected</p>
        <h2 id="rejectedCount">0</h2>
      </div>
    </section>

    <!-- Job Cards -->
    <section id="jobList" class="job-list"></section>

  </div>

  <script src="script.js"></script>
</body>

</html>
